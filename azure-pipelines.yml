trigger:
  branches:
    include:
      - main

pool:
  name: infra-pool

variables:
  ARM_USE_AZUREAD: 'true'

stages:
- stage: Terraform
  displayName: Terraform Deployment

  jobs:
  - job: TerraformJob
    displayName: Terraform Init

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.15.5'

    - powershell: |
        terraform version
      displayName: Verify Terraform Version

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
        backendServiceArm: 'Infra-Service_Principle'
        backendAzureRmResourceGroupName: 'production-rg'
        backendAzureRmStorageAccountName: 'prodstorage1998'
        backendAzureRmContainerName: 'container'
        backendAzureRmKey: 'terraform-tf-state'