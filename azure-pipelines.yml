trigger:
  branches:
    include:
      - main

pool:
  name: infra-pool

variables:
  ARM_USE_AZUREAD: true

stages:
- stage: Terraform
  jobs:
  - job: TerraformJob
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: latest

    - task: TerraformTask@5
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(System.DefaultWorkingDirectory)
        backendServiceArm: Infra-Service_Principle
        backendAzureRmResourceGroupName: production-rg
        backendAzureRmStorageAccountName: prodstorage1998
        backendAzureRmContainerName: container
        backendAzureRmKey: terraform-tf-state